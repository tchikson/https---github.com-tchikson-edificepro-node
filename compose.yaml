services:
  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000/api/csrf-token || exit 1']
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 90s
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_PORT: 3000
      APP_SECRET: ${APP_SECRET:-changez_cette_valeur}
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-app}
      DB_USER: ${POSTGRES_USER:-app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      SESSION_SECRET: ${SESSION_SECRET:-changez_cette_valeur_session}
    volumes:
      - public_data:/usr/src/app/public

  nginx:
    image: nginx:1.25-alpine
    ports:
      - '8080:80'
    volumes:
      - public_data:/usr/src/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ['CMD', 'pg_isready', '-d', '${POSTGRES_DB:-app}', '-U', '${POSTGRES_USER:-app}']
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  database_data:
  public_data:
