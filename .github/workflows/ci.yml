name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          APP_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: app_test
          DB_USER: app
          DB_PASSWORD: '!ChangeMe!'
        run: npx sequelize-cli db:migrate

      - name: Run tests
        env:
          APP_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: app_test
          DB_USER: app
          DB_PASSWORD: '!ChangeMe!'
          APP_SECRET: test-secret
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build and start containers
        run: docker compose up -d --build --wait --wait-timeout 300

      - name: Show logs on failure
        if: failure()
        run: docker compose logs app

      - name: Health check
        run: curl -f http://localhost:8080/login || (docker compose logs app && exit 1)

      - name: Stop containers
        if: always()
        run: docker compose down
